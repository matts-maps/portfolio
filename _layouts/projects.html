---
layout: default
---

<main class="page-content">
  <div class="page-inner">

    {{ content }}

    {% include project-filter-bar.html %}

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">

    <div id="map-and-panel">

      <div id="map-container">
        <div id="projects-map"></div>
        {% include project-legend.html %}
      </div>

      {% include project-details-panel.html %}

    </div>

    <section class="project-list-section">
      <h2 class="section-title">All Projects</h2>

      <table id="project-table" class="project-table">
        <thead>
          <tr>
            <th>Project Name</th>
            <th>Year</th>
            <th>Theme(s)</th>
            <th>Country</th>
            <th>Location</th>
            <th>Organisation</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="project-table-body"></tbody>
      </table>
    </section>

  </div>
</main>

<!-- MOVE SCRIPTS HERE -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script type="module" src="{{ '/assets/js/map-projects.js' | relative_url }}"></script>
