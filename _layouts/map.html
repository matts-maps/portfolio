<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

{{ content }}

{% include image-filter-bar.html %}

<div id="leaflet-map-canvas" style="height: 600px; width: 100%; border-radius: 6px; border: 1px solid #ccc; margin-top: 20px;"></div>

{% include image-lightbox.html %}

<script type="module">
  import { images } from "{{ site.baseurl }}/assets/js/image-data.js";
  import { initImageFilterEngine } from "{{ site.baseurl }}/assets/js/image-filter-engine.js";
  import { initLightbox, updateLightboxPool, launchLightbox } from "{{ site.baseurl }}/assets/js/image-lightbox.js";

  let mapInstance;
  let activeMarkersLayer;

  function initMapBase() {
    const canvas = document.getElementById('leaflet-map-canvas');
    if (!canvas) return;

    mapInstance = L.map('leaflet-map-canvas').setView([25, 10], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(mapInstance);

    activeMarkersLayer = L.layerGroup().addTo(mapInstance);
  }

  function renderMapMarkers(filteredItems) {
    if (!activeMarkersLayer) return;
    activeMarkersLayer.clearLayers();

    updateLightboxPool(filteredItems);

    filteredItems.forEach(item => {
      if (item.lat !== undefined && item.lng !== undefined) {
        const marker = L.marker([item.lat, item.lng]);

        marker.on('click', () => {
          launchLightbox(item);
        });

        activeMarkersLayer.addLayer(marker);
      }
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    initLightbox();
    initMapBase();
    initImageFilterEngine(images, renderMapMarkers);
  });
</script>
