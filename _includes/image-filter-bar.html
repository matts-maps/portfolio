<div id="image-filter-bar" class="filter-bar" style="margin-bottom: 2rem;">
  
  <div class="filter-row row-2" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; align-items: end;">
    
    <label style="font-weight: bold; display: flex; flex-direction: column; gap: 5px; font-size: 14px;">
      Sort
      <select id="ife-sort" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <option value="yearmonth">Newest → Oldest</option>
        <option value="alpha">A → Z</option>
        <option value="theme">Theme</option>
      </select>
    </label>

    <label style="font-weight: bold; display: flex; flex-direction: column; gap: 5px; font-size: 14px;">
      Continent
      <select id="ife-continent" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <option value="">All Continents</option>
      </select>
    </label>

    <label style="font-weight: bold; display: flex; flex-direction: column; gap: 5px; font-size: 14px;">
      Country
      <select id="ife-country" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <option value="">All Countries</option>
      </select>
    </label>

    <label style="font-weight: bold; display: flex; flex-direction: column; gap: 5px; font-size: 14px;">
      Disaster
      <select id="ife-disaster" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <option value="">All Disasters</option>
      </select>
    </label>

    <label style="font-weight: bold; display: flex; flex-direction: column; gap: 5px; font-size: 14px;">
      Theme
      <select id="ife-theme" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <option value="">All Themes</option>
      </select>
    </label>

    <label style="font-weight: bold; display: flex; flex-direction: column; gap: 5px; font-size: 14px;">
      Year
      <select id="ife-year" style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        <option value="">All Years</option>
      </select>
    </label>

    <button id="ife-clear" class="clear-btn" style="padding: 8px 16px; cursor: pointer; border-radius: 4px; border: 1px solid #999; background: #f8f9fa; height: 40px;">Clear Filters</button>
  </div>
</div>
