<div id="project-filter-bar">

  <!-- SORTING -->
  <div class="filter-group">
    <label for="sort-filter">Sort</label>
    <select id="sort-filter">
      <option value="year">Date (Newest)</option>
      <option value="alpha">Alphabetical</option>
      <option value="theme">Theme</option>
    </select>
  </div>

  <!-- CONTINENT -->
  <div class="filter-group">
    <label for="continent-filter">Continent</label>
    <select id="continent-filter">
      <option value="">All</option>
    </select>
  </div>

  <!-- COUNTRY (dependent) -->
  <div class="filter-group">
    <label for="country-filter">Country</label>
    <select id="country-filter">
      <option value="">All</option>
    </select>
  </div>

  <!-- LOCATION (dependent) -->
  <div class="filter-group">
    <label for="location-filter">Location</label>
    <select id="location-filter">
      <option value="">All</option>
    </select>
  </div>

  <!-- THEME (single-select) -->
  <div class="filter-group">
    <label for="theme-filter">Theme</label>
    <select id="theme-filter">
      <option value="">All</option>
    </select>
  </div>

  <!-- MODALITY -->
  <div class="filter-group">
    <label for="modality-filter">Modality</label>
    <select id="modality-filter">
      <option value="">All</option>
    </select>
  </div>

  <!-- RESET -->
  <button id="reset-filters">Reset</button>

</div>
