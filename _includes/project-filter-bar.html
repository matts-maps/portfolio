<div id="project-filter-bar">

  <div class="filter-group">
    <label for="project-search">Search</label>
    <input type="text" id="project-search" placeholder="Search projects…">
  </div>

  <div class="filter-group">
    <label for="theme-filter">Theme</label>
    <select id="theme-filter">
      <option value="">All themes</option>
      <option value="Training">Training</option>
      <option value="Response">Response</option>
      <option value="Preparedness and anticipatory action">Preparedness & anticipatory action</option>
    </select>
  </div>

  <div class="filter-group">
    <label for="continent-filter">Continent</label>
    <select id="continent-filter">
      <option value="">All continents</option>
      <option value="Africa">Africa</option>
      <option value="Asia">Asia</option>
      <option value="Europe">Europe</option>
      <option value="Oceania">Oceania</option>
      <option value="Caribbean">Caribbean</option>
    </select>
  </div>

  <div class="filter-group">
    <label for="modality-filter">Modality</label>
    <select id="modality-filter">
      <option value="">All modalities</option>
      <option value="In-situ">In-situ</option>
      <option value="Remote">Remote</option>
      <option value="In-situ and remote">In-situ & remote</option>
    </select>
  </div>

</div>
