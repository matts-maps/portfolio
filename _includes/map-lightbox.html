<div id="map-lightbox" class="lightbox hidden" data-baseurl="/portfolio">

  <!-- CLOSE BUTTON -->
  <span id="map-lightbox-close" class="lightbox-close">&times;</span>

  <!-- ZOOM CONTROLS -->
  <div id="map-zoom-controls" class="zoom-controls">
    <button id="map-zoom-in" class="zoom-btn">+</button>
    <button id="map-zoom-out" class="zoom-btn">−</button>
    <button id="map-zoom-reset" class="zoom-btn">Reset</button>
  </div>

  <!-- PREV / NEXT NAVIGATION -->
  <button id="map-lightbox-prev" class="lightbox-nav">&#10094;</button>
  <button id="map-lightbox-next" class="lightbox-nav">&#10095;</button>

  <!-- IMAGE VIEWER -->
  <div id="map-lightbox-viewer" class="lightbox-viewer">
    <img id="map-lightbox-img" class="lightbox-img" src="" alt="">
  </div>

  <!-- CAPTION -->
  <div id="map-lightbox-caption" class="lightbox-caption"></div>

</div>
