<aside class="filter-panel">
  <h2>Filters</h2>

  <label>
    <span>Search</span>
    <input type="text" id="filter-search" placeholder="Search title...">
  </label>

  <label>
    <span>Sort</span>
    <select id="filter-sort">
      <option value="alpha">Alphabetical</option>
      <option value="year">Year</option>
      <option value="theme">Theme</option>
    </select>
  </label>

  <label>
    <span>Continent</span>
    <select id="filter-continent"></select>
  </label>

  <label>
    <span>Country</span>
    <select id="filter-country"></select>
  </label>

  <label>
    <span>Location</span>
    <select id="filter-location"></select>
  </label>

  <label>
    <span>Disaster</span>
    <select id="filter-disaster"></select>
  </label>

  <h3>Themes</h3>
  <div id="filter-themes" class="theme-checkboxes"></div>

  <button id="filter-reset" class="reset-btn">Reset filters</button>
</aside>
