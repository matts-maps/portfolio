<div id="project-details-panel" class="project-details-panel hidden">
  <button id="close-project-details" class="project-details-close" aria-label="Close project details">
    ×
  </button>

  <!-- Title -->
  <h2 id="project-title"></h2>

  <!-- Location (if present) -->
  <p id="project-location" class="details-location"></p>

  <!-- Country · Year -->
  <p class="details-country-year">
    <span id="project-country"></span>
    <span id="project-year"></span>
  </p>

  <!-- Type · Disaster (if present) -->
  <p class="details-type-disaster">
    <span id="project-type"></span>
    <span id="project-disaster"></span>
  </p>

  <!-- Description -->
  <p id="project-description" class="details-description"></p>

  <!-- Organisations (if present) -->
  <p id="project-organisation" class="details-organisation"></p>
</div>
